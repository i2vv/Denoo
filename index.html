<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقعي الشخصي | devtonx</title>
    <style>
        /* تنسيقات فخمة وعصرية */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            width: 85%;
            max-width: 450px;
            padding: 40px;
            background: rgba(30, 41, 59, 0.7);
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* تنسيق الصورة الشخصية */
        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #38bdf8;
            margin-bottom: 25px;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
            transition: transform 0.3s ease;
        }

        .profile-img:hover {
            transform: rotate(5deg) scale(1.05);
        }

        h1 {
            color: #38bdf8;
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        .intro-text {
            font-size: 1.1rem;
            line-height: 1.7;
            color: #94a3b8;
            margin-bottom: 30px;
        }

        /* تنسيق صندوق المقطع */
        .media-box {
            width: 100%;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid #334155;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        video {
            width: 100%;
            display: block;
        }

        .footer {
            margin-top: 30px;
            font-size: 0.8rem;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        strong {
            color: #f1f5f9;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="pic1.jpg" alt="دينو" class="profile-img">

        <h1>مرحبا بك في موقعي الشخصي 👀</h1>

        <div class="intro-text">
            هذا موقعي الشخصي لي - <strong>دينو (devtonx)</strong><br>
            وهذا شكل مبسط له وان شاء الله يعجبكم ~
        </div>

        <div class="media-box">
            <video autoplay loop muted playsinline title="Dino's Animation">
                <source src="vid1.mp4" type="video/mp4">
            </video>
        </div>

        <div class="footer">
            Designed by devtonx © 2026
        </div>
    </div>

</body>
</html>
